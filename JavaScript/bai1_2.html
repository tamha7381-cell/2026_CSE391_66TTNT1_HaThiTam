<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý điểm sinh viên</title>
    <style>
body{
    font-family: Arial;
    width: 700px;
    margin:auto;}
h1{
    text-align:center;}

input, select, button{
    padding:6px;
    margin:5px;}

#addBtn{
    background:gold;
    border:none;}

.delete{
    background:red;
    color:white;
    border:none;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;}

thead{
    background:#eee;
    cursor:pointer;}

.low-score{
    background:yellow;}
</style>
</head>

<body>
    <h1>Quản lý điểm sinh viên</h1>
    <div class="form">
        <input type="text" id="name" placeholder="Họ tên">
        <input type="number" id="score" placeholder="Điểm (0-10)">
        <button id="addBtn">Thêm</button>
    </div>
    <div class="filters">
        <input type="text" id="search" placeholder="Tìm kiếm tên...">

        <select id="rankFilter">
            <option value="all">Tất cả</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>
    </div>
<table>
    <thead>
    <tr>
        <th>STT</th>
        <th>Họ tên</th>
        <th id="sortScore">Điểm</th>
        <th>Xếp loại</th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>
<p id="stats"></p>
<script src="bai1_2.js"></script>
</body>
</html>
