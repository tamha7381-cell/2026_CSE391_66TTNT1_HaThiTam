<!DOCTYPE html>
<htlm lang="vi"
<head>
    <meta charset = "UTF-8">
    <title>Quản lý diểm Sinh Viên</title>
    <style>
body{
    font-family: Arial;
    width: 600px;
    margin: auto;}
h2{
    text-align: center;}
.form{
    margin-bottom: 15px;}
input{
    padding: 6px;
    margin-right: 5px;}
button{
    padding: 6px 10p;
    background-color: yellow;}
table{
    width: 100%;
    border-collapse: collapse;}
th, td{
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;}
.low-score{
    background: yellow;}
.delete{
    background: red;
    color: white;
    border: none;
    padding: 5px 8px;
    cursor: pointer;}
</style>
</head>
<body>
    <h2>Quản lý điểm Sinh Viên</h2>
    <div class ="form">
        <input type="text" id="name" placeholder="Họ tên">
        <input type="number" id="score" placeholder="Điểm (0-10)" step="0.1">
        <button id="addBtn">Thêm</button>
    </div>
    <table>
        <thead>
           <tr>
            <th>STT</th>
            <th>Họ Tên</th>
            <th>Điểm</th>
            <th>Xếp loại</th>
            <th>Thao tác</th>
        </thead>

        <tbody id="tableBody">
        </tbody>
    </table>
<p id="stats">Tổng sinh viên: 0 | Điểm trung bình: 0</p>
<script src="bai1_1.js"></script>
</body>
</html>
